<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>66 Cheesecake Staff Portal</title>
<style>
:root{
  --bg:#fff8ef;
  --card:#fff;
  --main:#b77935;
  --dark:#7a4b20;
  --line:#ead7c2;
  --text:#2b2118;
  --muted:#7b6b5f;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:30px 20px 22px;
  background:linear-gradient(135deg,#fff0da,#f7d7a8);
  border-bottom:1px solid var(--line);
}
header h1{
  margin:0;
  font-size:30px;
  line-height:1.15;
  color:var(--dark);
}
header p{
  margin:8px 0 0;
  font-size:14px;
  color:var(--muted);
}
main{
  max-width:680px;
  margin:0 auto;
  padding:16px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 6px 18px rgba(122,75,32,.06);
}
h2{
  margin:0 0 12px;
  font-size:18px;
  color:var(--dark);
}
select{
  width:100%;
  height:46px;
  border:1px solid var(--line);
  border-radius:16px;
  padding:0 14px;
  font-size:16px;
  background:#fffdfa;
}
.menu{
  display:grid;
  gap:12px;
}
.menu button{
  width:100%;
  border:none;
  border-radius:18px;
  padding:18px 16px;
  text-align:left;
  font-size:17px;
  font-weight:800;
  color:#fff;
  background:var(--main);
  cursor:pointer;
}
.menu button.secondary{
  background:#9a6936;
}
.menu button.light{
  background:#f1d6b5;
  color:var(--dark);
}
.small{
  font-size:13px;
  color:var(--muted);
  margin-top:8px;
  line-height:1.5;
}
.today{
  font-size:15px;
  line-height:1.7;
}
.badge{
  display:inline-block;
  padding:3px 9px;
  border-radius:999px;
  background:#fff2dc;
  color:var(--dark);
  font-size:12px;
  font-weight:800;
}
@media(max-width:760px){
  header{padding:24px 18px 18px}
  header h1{font-size:28px}
  main{padding:12px}
  .card{padding:16px;border-radius:20px}
  .menu button{padding:16px;font-size:16px}
}
</style>
</head>
<body>

<header>
  <h1>66 Cheesecake<br>Staff Portal</h1>
  <p>員工系統｜排班｜人力總覽｜門市盤點</p>
</header>

<main>

  <section class="card">
    <h2>請選擇分店</h2>
    <select id="store">
      <option value="板橋大遠百">板橋大遠百</option>
      <option value="林口三井Outlet">林口三井Outlet</option>
      <option value="高雄漢神巨蛋">高雄漢神巨蛋</option>
      <option value="台中大遠百">台中大遠百</option>
    </select>
    <div class="small">選擇分店後，系統會帶入到排班、人力總覽與盤點系統。</div>
  </section>

  <section class="card">
    <h2>今日資訊</h2>
    <div class="today" id="todayInfo"></div>
  </section>

  <section class="card">
    <h2>功能選單</h2>
    <div class="menu">
      <button onclick="goPage('shift-form.html')">🗓 我的排班填寫</button>
      <button class="secondary" onclick="goPage('shift-overview.html')">👥 每日人力總覽</button>
      <button class="light" onclick="goInventory()">📦 門市盤點系統</button>
    </div>
  </section>

</main>

<script>
function getStore(){
  return document.getElementById("store").value;
}

function goPage(page){
  const store = encodeURIComponent(getStore());
  window.location.href = `${page}?store=${store}`;
}

function goInventory(){

  const store =
    document.getElementById("store").value;

  window.location.href =
    "https://daisy-66.github.io/66cheesecake-site/?store="
    + encodeURIComponent(store);
}

function renderToday(){
  const now = new Date();
  const week = ["日","一","二","三","四","五","六"];
  const month = now.getMonth() + 1;
  const date = now.getDate();
  const day = week[now.getDay()];

  const events = {
    "5/4":"消毒＋閉店停電",
    "5/5":"閉店停電",
    "5/6":"閉店停電"
  };

  const key = `${month}/${date}`;
  const event = events[key];

  document.getElementById("todayInfo").innerHTML = `
    <strong>${month}/${date}（${day}）</strong><br>
    ${event ? `<span class="badge">⚠️ ${event}</span>` : `<span class="badge">今日無特殊事項</span>`}
  `;
}

renderToday();
</script>

</body>
</html>
